<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공지사항 — (주) 에어브리지</title>
<link rel="stylesheet" href="style.css">
<style>
.page-hero{padding:56px 0 40px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,var(--bg2) 0%,var(--bg) 100%)}
.page-hero-tag{font-size:11px;font-family:var(--mono);color:var(--cyan);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.page-hero h1{font-size:clamp(24px,3.5vw,40px);font-weight:900;letter-spacing:-0.5px;margin-bottom:8px}
.page-hero p{font-size:14px;color:var(--muted)}
.db-warn{display:none;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);border-radius:10px;padding:14px 18px;font-size:13px;color:var(--amber);margin-bottom:20px;line-height:1.7}
.notice-list{display:flex;flex-direction:column}
.notice-item{display:flex;align-items:center;gap:14px;padding:18px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .18s;color:var(--text)}
.notice-item:first-child{border-top:1px solid var(--border)}
.notice-item:hover{background:var(--surface)}
.notice-pin{flex-shrink:0;font-size:11px;color:var(--cyan);background:rgba(34,211,238,.1);border:1px solid rgba(34,211,238,.2);border-radius:4px;padding:2px 7px;font-family:var(--mono)}
.notice-title-col{flex:1;min-width:0}
.notice-title{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.notice-meta{display:flex;gap:12px;margin-top:4px;font-size:12px;color:var(--muted);font-family:var(--mono)}
.detail-view{display:none}
.notice-back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);cursor:pointer;margin-bottom:24px;background:none;border:none;font-family:var(--sans);padding:0;transition:color .2s}
.notice-back:hover{color:var(--cyan)}
.notice-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:32px}
.notice-card-title{font-size:22px;font-weight:900;letter-spacing:-.5px;margin-bottom:12px}
.notice-card-meta{display:flex;gap:16px;font-size:12px;color:var(--muted);font-family:var(--mono);margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.notice-card-body{font-size:15px;line-height:1.95;color:var(--text2);white-space:pre-line}
.notice-admin-actions{display:flex;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.btn-edit{font-size:13px;color:var(--cyan);background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.2);border-radius:6px;padding:7px 14px;cursor:pointer}
.btn-del{font-size:13px;color:var(--red);background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:6px;padding:7px 14px;cursor:pointer}
.admin-bar{display:flex;justify-content:flex-end;align-items:center;gap:10px;margin-bottom:16px}
.btn-al{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-family:var(--mono);color:var(--muted2);background:transparent;border:1px solid var(--border);border-radius:6px;padding:6px 12px;cursor:pointer;transition:all .2s}
.btn-al:hover{color:var(--cyan);border-color:var(--cyan-dim)}
.btn-aw{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:#fff;background:var(--cyan-dim);border:none;border-radius:6px;padding:8px 16px;cursor:pointer;transition:opacity .2s}
.btn-aw:hover{opacity:.85}
.btn-lo{font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:var(--mono)}
.btn-lo:hover{color:var(--red)}
.modal-bg{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.72);backdrop-filter:blur(4px);align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;width:100%;max-width:520px;margin:16px;max-height:90vh;overflow-y:auto}
.mt{font-size:18px;font-weight:900;margin-bottom:24px}
.mf{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.ml{font-size:12px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.mi{background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 14px;font-size:14px;font-family:var(--sans);outline:none;transition:border-color .2s;width:100%}
.mi:focus{border-color:var(--cyan-dim)}
.mi-ta{resize:vertical;min-height:200px}
.mcheck{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);cursor:pointer}
.mcheck input{width:16px;height:16px;accent-color:var(--cyan)}
.modal-btns{display:flex;gap:10px;margin-top:20px}
.m-ca{flex:1;padding:11px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:14px;cursor:pointer;font-family:var(--sans)}
.m-ok{flex:2;padding:11px;border-radius:8px;border:none;background:var(--cyan-dim);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--sans)}
.m-ca:hover{border-color:var(--border2);color:var(--text)}
.m-ok:hover{opacity:.85}
.merr{font-size:12px;color:var(--red);margin-top:8px;display:none}
.empty-box{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}
.loading-box{text-align:center;padding:40px;color:var(--muted)}

/* 통계 모달 */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
.stat-num{font-size:28px;font-weight:900;font-family:var(--mono);color:var(--cyan);letter-spacing:-1px}
.stat-label{font-size:11px;color:var(--muted);margin-top:4px;font-family:var(--mono)}
.stats-table{width:100%;border-collapse:collapse;font-size:13px}
.stats-table th{padding:8px 12px;text-align:left;font-size:11px;font-family:var(--mono);color:var(--muted2);border-bottom:1px solid var(--border);text-transform:uppercase}
.stats-table td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text2)}
.stats-table tr:last-child td{border-bottom:none}
.stats-table tr:hover td{background:var(--surface2)}
</style>
</head>
<body>
<div class="page-wrap">
  <div class="page-hero">
    <div class="container">
      <div class="page-hero-tag">Notice</div>
      <h1>공지사항</h1>
      <p>(주) 에어브리지의 공지 및 안내사항입니다.</p>
    </div>
  </div>
  <section class="section">
    <div class="container">
      <div class="db-warn" id="db-warn">⚠️ Supabase가 연결되지 않았습니다. <code>supabase-config.js</code>에서 URL과 KEY를 설정해 주세요.</div>
      <div class="admin-bar" id="admin-bar">
        <button class="btn-al" onclick="openLogin()">🔐 관리자 로그인</button>
      </div>
      <div id="list-view">
        <div id="loading-box" class="loading-box">불러오는 중...</div>
        <div class="notice-list" id="notice-list"></div>
        <div class="empty-box" id="empty-box" style="display:none;">등록된 공지사항이 없습니다.</div>
      </div>
      <div class="detail-view" id="detail-view">
        <button class="notice-back" onclick="showList()">← 목록으로</button>
        <div class="notice-card">
          <div class="notice-card-title" id="d-title"></div>
          <div class="notice-card-meta" id="d-meta"></div>
          <div class="notice-card-body" id="d-body"></div>
          <div class="notice-admin-actions" id="d-admin" style="display:none;">
            <button class="btn-edit" onclick="openEdit()">✏️ 수정</button>
            <button class="btn-del"  onclick="doDelete()">🗑 삭제</button>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>


<!-- 통계 모달 -->
<div class="modal-bg" id="m-stats">
  <div class="modal-box" style="max-width:600px;">
    <div class="mt">📊 운임계산기 사용 통계</div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-num" id="st-total">-</div>
        <div class="stat-label">총 계산 횟수</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="st-today">-</div>
        <div class="stat-label">오늘</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="st-week">-</div>
        <div class="stat-label">최근 7일</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="st-month">-</div>
        <div class="stat-label">최근 30일</div>
      </div>
    </div>
    <div style="font-size:12px;font-family:var(--mono);color:var(--muted2);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px;">최근 계산 이력</div>
    <div style="overflow-x:auto;max-height:300px;overflow-y:auto;">
      <table class="stats-table">
        <thead><tr><th>#</th><th>일시</th><th>국가</th><th>수출/수입</th></tr></thead>
        <tbody id="st-tbody"><tr><td colspan="4" style="text-align:center;padding:20px;color:var(--muted);">불러오는 중...</td></tr></tbody>
      </table>
    </div>
    <div class="modal-btns" style="margin-top:16px;">
      <button class="m-ok" onclick="closeM('m-stats')">닫기</button>
    </div>
  </div>
</div>

<!-- 로그인 모달 -->
<div class="modal-bg" id="m-login">
  <div class="modal-box" style="max-width:360px;">
    <div class="mt">🔐 관리자 로그인</div>
    <div class="mf"><label class="ml">아이디</label><input class="mi" id="l-id" type="text" placeholder="admin"></div>
    <div class="mf"><label class="ml">비밀번호</label><input class="mi" id="l-pw" type="password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="merr" id="l-err">아이디 또는 비밀번호가 틀렸습니다.</div>
    <div class="modal-btns">
      <button class="m-ca" onclick="closeM('m-login')">취소</button>
      <button class="m-ok" onclick="doLogin()">로그인</button>
    </div>
  </div>
</div>

<!-- 글쓰기 모달 -->
<div class="modal-bg" id="m-write">
  <div class="modal-box">
    <div class="mt" id="m-write-title">📝 공지사항 작성</div>
    <div class="mf"><label class="ml">제목</label><input class="mi" id="w-title" type="text" placeholder="제목을 입력하세요"></div>
    <div class="mf"><label class="ml">내용</label><textarea class="mi mi-ta" id="w-body" placeholder="내용을 입력하세요"></textarea></div>
    <div class="mf"><label class="ml">게시 날짜 <span style="font-size:11px;color:var(--muted);font-weight:400;">(변경 가능)</span></label><input class="mi" id="w-date" type="date"></div>
    <label class="mcheck"><input type="checkbox" id="w-pinned"> 📌 상단 고정 (중요 공지)</label>
    <div class="modal-btns">
      <button class="m-ca" onclick="closeM('m-write')">취소</button>
      <button class="m-ok" onclick="saveNotice()">게시하기</button>
    </div>
  </div>
</div>

<script src="supabase-config.js"></script>
<script src="common.js"></script>
<script>
const ADMIN_ID='admin', ADMIN_PW='a12345';
let isAdmin=false, notices=[], editId=null, currentId=null;

async function init(){
  if(!DB.ready()){ document.getElementById('db-warn').style.display='block'; await loadFallback(); return; }
  if(sessionStorage.getItem('ab_admin')==='1'){ isAdmin=true; showAdminUI(); }
  await loadNotices();
}
async function loadNotices(){
  try{ notices=await DB.get('notices','order=pinned.desc,created_at.desc'); renderList(); }
  catch(e){ document.getElementById('loading-box').textContent='데이터를 불러오지 못했습니다.'; }
}
async function loadFallback(){
  try{ const r=await fetch('notices.json?t='+Date.now()); if(r.ok) notices=await r.json(); } catch(e){}
  renderList();
}
function renderList(){
  document.getElementById('loading-box').style.display='none';
  const el=document.getElementById('notice-list');
  if(!notices.length){ document.getElementById('empty-box').style.display='block'; return; }
  document.getElementById('empty-box').style.display='none';
  el.innerHTML=notices.map(n=>`
    <div class="notice-item" onclick="showDetail(${n.id})">
      ${n.pinned?'<span class="notice-pin">📌 고정</span>':''}
      <div class="notice-title-col">
        <div class="notice-title">${esc(n.title)}</div>
        <div class="notice-meta"><span>📅 ${fmtDate(n.created_at||n.date)}</span><span>👁 ${(n.views||0).toLocaleString()}</span></div>
      </div>
      <span style="color:var(--muted2);font-size:18px;">›</span>
    </div>`).join('');
}
async function showDetail(id){
  const n=notices.find(x=>x.id===id); if(!n) return;
  currentId=id;
  const nv=(n.views||0)+1;
  if(DB.ready()) DB.patch('notices',`id=eq.${id}`,{views:nv}).catch(()=>{});
  n.views=nv;
  document.getElementById('d-title').textContent=n.title;
  document.getElementById('d-meta').innerHTML=`<span>📅 ${fmtDate(n.created_at||n.date)}</span><span>👁 ${nv.toLocaleString()} 조회</span>${n.pinned?'<span style="color:var(--cyan);">📌 고정</span>':''}`;
  document.getElementById('d-body').textContent=n.content;
  document.getElementById('d-admin').style.display=isAdmin?'flex':'none';
  document.getElementById('list-view').style.display='none';
  document.getElementById('detail-view').style.display='block';
}
function showList(){
  currentId=null;
  document.getElementById('detail-view').style.display='none';
  document.getElementById('list-view').style.display='block';
}
function openLogin(){
  document.getElementById('l-id').value=''; document.getElementById('l-pw').value='';
  document.getElementById('l-err').style.display='none'; openM('m-login');
  setTimeout(()=>document.getElementById('l-id').focus(),100);
}
function doLogin(){
  if(document.getElementById('l-id').value.trim()===ADMIN_ID && document.getElementById('l-pw').value===ADMIN_PW){
    isAdmin=true; sessionStorage.setItem('ab_admin','1'); closeM('m-login'); showAdminUI();
  } else { document.getElementById('l-err').style.display='block'; }
}

async function openStats(){
  openM('m-stats');
  if(!DB.ready()){
    document.getElementById('st-tbody').innerHTML='<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--amber);">Supabase 미연결 상태입니다.</td></tr>';
    return;
  }
  try{
    // 전체 로그 가져오기 (최신 100건)
    const logs = await DB.get('calc_logs','order=created_at.desc&limit=100');
    const total = logs.length;

    const now   = new Date();
    const todayStr  = now.toISOString().slice(0,10);
    const weekAgo   = new Date(now - 7 *24*60*60*1000).toISOString();
    const monthAgo  = new Date(now - 30*24*60*60*1000).toISOString();

    const todayCnt  = logs.filter(l=>l.created_at&&l.created_at.slice(0,10)===todayStr).length;
    const weekCnt   = logs.filter(l=>l.created_at&&l.created_at>=weekAgo).length;
    const monthCnt  = logs.filter(l=>l.created_at&&l.created_at>=monthAgo).length;

    document.getElementById('st-total').textContent = total;
    document.getElementById('st-today').textContent = todayCnt;
    document.getElementById('st-week').textContent  = weekCnt;
    document.getElementById('st-month').textContent = monthCnt;

    document.getElementById('st-tbody').innerHTML = logs.slice(0,50).map((l,i)=>`
      <tr>
        <td style="color:var(--muted2);font-family:var(--mono);">${i+1}</td>
        <td style="font-family:var(--mono);font-size:12px;">${fmtDate(l.created_at)}</td>
        <td>${esc(l.country||'-')}</td>
        <td><span style="color:${l.mode==='수출'?'var(--cyan)':'var(--amber)'}">${esc(l.mode||'-')}</span></td>
      </tr>`).join('') || '<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--muted);">사용 이력 없음</td></tr>';
  }catch(e){
    document.getElementById('st-tbody').innerHTML=`<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--red);">오류: ${e.message}</td></tr>`;
  }
}

function doLogout(){
  isAdmin=false; sessionStorage.removeItem('ab_admin');
  document.getElementById('admin-bar').innerHTML=`<button class="btn-al" onclick="openLogin()">🔐 관리자 로그인</button>`;
  document.getElementById('d-admin').style.display='none';
}
function showAdminUI(){
  document.getElementById('admin-bar').innerHTML=`
    <span style="font-size:12px;color:var(--cyan);font-family:var(--mono);">✅ 관리자</span>
    <button class="btn-aw" style="background:var(--surface2);color:var(--text);border:1px solid var(--border);" onclick="openStats()">📊 사용 통계</button>
    <button class="btn-aw" onclick="openWrite()">✏️ 새 공지 작성</button>
    <button class="btn-lo" onclick="doLogout()">로그아웃</button>`;
}
function openWrite(){
  editId=null; document.getElementById('m-write-title').textContent='📝 공지사항 작성';
  document.getElementById('w-title').value=''; document.getElementById('w-body').value='';
  document.getElementById('w-pinned').checked=false;
  document.getElementById('w-date').value=new Date().toISOString().slice(0,10);
  openM('m-write');
  setTimeout(()=>document.getElementById('w-title').focus(),100);
}
function openEdit(){
  const n=notices.find(x=>x.id===currentId); if(!n) return;
  editId=n.id; document.getElementById('m-write-title').textContent='✏️ 공지사항 수정';
  document.getElementById('w-title').value=n.title; document.getElementById('w-body').value=n.content;
  document.getElementById('w-pinned').checked=!!n.pinned;
  const existDate=(n.created_at||n.date||'').slice(0,10)||new Date().toISOString().slice(0,10);
  document.getElementById('w-date').value=existDate;
  openM('m-write');
}
async function saveNotice(){
  const title=document.getElementById('w-title').value.trim();
  const content=document.getElementById('w-body').value.trim();
  const pinned=document.getElementById('w-pinned').checked;
  const dateVal=document.getElementById('w-date').value;
  const created_at=dateVal ? new Date(dateVal+'T00:00:00+09:00').toISOString() : new Date().toISOString();
  if(!title){alert('제목을 입력해주세요.');return;}
  if(!content){alert('내용을 입력해주세요.');return;}
  if(DB.ready()){
    try{
      if(editId){ const r=await DB.patch('notices',`id=eq.${editId}`,{title,content,pinned,created_at}); const i=notices.findIndex(x=>x.id===editId); if(i>=0&&r[0]) notices[i]={...notices[i],...r[0]}; }
      else { const r=await DB.post('notices',{title,content,pinned,views:0,created_at}); if(r[0]) notices.unshift(r[0]); }
    } catch(e){ alert('저장 중 오류: '+e.message); return; }
  } else {
    if(editId){ const i=notices.findIndex(x=>x.id===editId); if(i>=0) notices[i]={...notices[i],title,content,pinned}; }
    else { const nid=notices.length?Math.max(...notices.map(x=>x.id))+1:1; notices.unshift({id:nid,title,content,pinned,views:0,created_at:new Date().toISOString()}); }
    alert('⚠️ Supabase 미연결 — 새로고침 시 데이터가 사라집니다.');
  }
  closeM('m-write');
  if(editId&&currentId) showDetail(currentId); else { renderList(); showList(); }
  editId=null;
}
async function doDelete(){
  if(!confirm('이 공지사항을 삭제하시겠습니까?')) return;
  if(DB.ready()){ try{ await DB.del('notices',`id=eq.${currentId}`); } catch(e){ alert('삭제 실패: '+e.message); return; } }
  notices=notices.filter(x=>x.id!==currentId);
  showList(); renderList();
}
function openM(id){ document.getElementById(id).classList.add('open'); }
function closeM(id){ document.getElementById(id).classList.remove('open'); }
document.addEventListener('click',e=>{ ['m-login','m-write'].forEach(id=>{ if(e.target===document.getElementById(id)) closeM(id); }); });
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(d){ if(!d) return ''; return new Date(d).toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'}); }
init();
</script>
</body>
</html>
