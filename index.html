<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>에어브리지 국제특송 — 글로벌 특송 전문 (DHL·FedEx·UPS)</title>
<meta name="description" content="에어브리지 국제특송은 글로벌 특송사(DHL, FedEx, UPS)와 함께 항공특급, 항공화물, 해상화물 서비스를 제공합니다.">
<link rel="stylesheet" href="style.css">
<style>
/* ── 배경 슬라이드 시스템 (픽스 완료) ── */
.bg-slider {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1; /* 레이어 순서 조정 */
    overflow: hidden;
}
.slide {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    opacity: 0;
    transition: opacity 2s ease-in-out;
}
/* 사진이 더 선명하게 보이도록 활성 상태 투명도 상향 */
.slide.active { 
    opacity: 0.55 !important; 
}

/* 외부 이미지 경로 */
#slide1 { background-image: url('https://images.unsplash.com/photo-1542296332-2e4473faf563?q=80&w=1600&auto=format&fit=crop'); } 
#slide2 { background-image: url('https://images.unsplash.com/photo-1494412574643-ff11b0a5c1c3?q=80&w=1600&auto=format&fit=crop'); }
#slide3 { background-image: url('https://images.unsplash.com/photo-1586528116311-ad8ed745eb33?q=80&w=1600&auto=format&fit=crop'); }

/* ── HERO 섹션 수정 ── */
.hero {
  min-height: calc(100vh - var(--nav-h));
  display: flex;
  align-items: center;
  position: relative;
  overflow: hidden;
  padding: 80px 0;
  /* 중요: 기존의 진한 배경색을 제거하거나 투명하게 하여 사진이 보이게 함 */
  background: #0b1120; 
}

.hero-bg {
  position: absolute;
  inset: 0;
  /* 사진과 겹쳤을 때 글자가 잘 보이게 하는 오버레이 */
  background: linear-gradient(to bottom, rgba(11, 17, 32, 0.8), rgba(11, 17, 32, 0.5));
  z-index: 2;
  pointer-events: none;
}

.hero-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(42,51,71,0.4) 1px, transparent 1px),
    linear-gradient(90deg, rgba(42,51,71,0.4) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 95%);
  z-index: 3;
  opacity: 0.3;
  pointer-events: none;
}

.hero-content {
  position: relative;
  z-index: 10;
  max-width: 800px;
}

/* ── 기타 컴포넌트 스타일 (유지) ── */
.hero-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(34,211,238,0.1); border: 1px solid rgba(34,211,238,0.25);
  border-radius: 20px; padding: 5px 14px 5px 10px; font-size: 12px;
  color: var(--cyan); font-family: var(--mono); margin-bottom: 28px;
}
.hero-badge-dot { width: 6px; height: 6px; background: var(--cyan); border-radius: 50%; }
.hero-title { font-size: clamp(34px, 5vw, 64px); font-weight: 900; letter-spacing: -2px; line-height: 1.1; margin-bottom: 24px; color: #ffffff; }
.hero-title em { font-style: normal; color: var(--cyan); display: block; }
.hero-sub { font-size: 16px; color: rgba(255, 255, 255, 0.7); line-height: 1.8; margin-bottom: 40px; }
.hero-btns { display: flex; gap: 12px; flex-wrap: wrap; }

.hero-stats { display: flex; flex-direction: row; gap: 20px; margin-top: 50px; flex-wrap: wrap; }
.hero-stat { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 20px 24px; flex: 1; min-width: 180px; transition: all 0.3s; }
.hero-stat:hover { transform: translateY(-8px); background: rgba(255, 255, 255, 0.1); }
.hero-stat-num { font-size: 28px; font-weight: 900; font-family: var(--mono); color: var(--cyan); letter-spacing: -1px; }
.hero-stat-label { font-size: 13px; color: rgba(255, 255, 255, 0.6); margin-top: 6px; }

/* 공통 섹션 스타일 */
.section { padding: 100px 0; }
.section-tag { font-family: var(--mono); color: var(--cyan); font-size: 14px; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 2px; }
.section-title { font-size: clamp(28px, 4vw, 42px); font-weight: 800; margin-bottom: 20px; color: #fff; }
.highlight { color: var(--cyan); }
.carriers-bar { background: #111827; border-top: 1px solid rgba(255,255,255,0.1); padding: 25px 0; }
.carriers-inner { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; }
.carrier-item { display: flex; align-items: center; gap: 12px; }
.carrier-dot { width: 8px; height: 8px; border-radius: 50%; }

/* CTA BANNER */
.cta-banner { background: linear-gradient(135deg, #0e7490 0%, #1e3a5f 100%); border-radius: 24px; padding: 60px 56px; display: flex; align-items: center; justify-content: space-between; gap: 40px; position: relative; overflow: hidden; margin: 40px 0; }
.cta-title { font-size: 28px; font-weight: 800; color: #fff; }
.cta-btns { display: flex; gap: 15px; }
.cta-btn-w { padding: 14px 28px; background: #fff; color: #0e7490; border-radius: 10px; font-weight: 700; text-decoration: none; }

@media (max-width: 900px) {
  .hero-stats { flex-direction: column; }
  .cta-banner { flex-direction: column; text-align: center; }
}
</style>
</head>
<body>
<div class="page-wrap">

  <section class="hero">
    <div class="bg-slider">
        <div class="slide active" id="slide1"></div>
        <div class="slide" id="slide2"></div>
        <div class="slide" id="slide3"></div>
    </div>
    
    <div class="hero-bg"></div>
    <div class="hero-grid"></div>

    <div class="container">
      <div class="hero-content">
        <div class="hero-badge">
          <span class="hero-badge-dot"></span>
          글로벌 특송 파트너 — DHL · FedEx · UPS
        </div>
        <h1 class="hero-title">
          더 넓은 세상으로<br>
          <em>가장 빠른 연결</em>
        </h1>
        <p class="hero-sub">
          에어브리지 국제특송은 글로벌 톱 클래스 특송사와 함께하며<br>
          기업 물류부터 개인 택배까지 최적의 운송 솔루션을 제공합니다.
        </p>
        <div class="hero-btns">
          <a href="/calculator.html" class="btn btn-primary btn-lg">✈ 실시간 운임조회</a>
          <a href="/contact.html" class="btn btn-outline btn-lg">📞 비즈니스 상담</a>
        </div>

        <div class="hero-stats">
          <div class="hero-stat">
            <div class="hero-stat-num">230<span style="font-size:16px;">+</span></div>
            <div class="hero-stat-label">서비스 배송 가능 국가</div>
          </div>
          <div class="hero-stat">
            <div class="hero-stat-num">Express</div>
            <div class="hero-stat-label">DHL · FedEx · UPS 정식 연계</div>
          </div>
          <div class="hero-stat">
            <div class="hero-stat-num">1<span style="font-size:16px;">일~</span></div>
            <div class="hero-stat-label">전 세계 최단 배송일 보장</div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div class="carriers-bar">
    <div class="carriers-inner">
      <div class="carrier-item">
        <div class="carrier-dot" style="background:#ef4444;"></div>
        <div class="carrier-name" style="color:#ef4444; font-weight: 700;">DHL Express</div>
      </div>
      <div class="carrier-item">
        <div class="carrier-dot" style="background:#a855f7;"></div>
        <div class="carrier-name" style="color:#a855f7; font-weight: 700;">FedEx</div>
      </div>
      <div class="carrier-item">
        <div class="carrier-dot" style="background:#f97316;"></div>
        <div class="carrier-name" style="color:#f97316; font-weight: 700;">UPS</div>
      </div>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div class="cta-banner">
        <div>
          <div class="cta-title">지금 바로 운임을 계산해보세요</div>
          <p style="color: rgba(255,255,255,0.8); margin-top: 10px;">수출·수입 전 구간 실시간 견적 제공</p>
        </div>
        <div class="cta-btns">
          <a href="/calculator.html" class="cta-btn-w">✈ 운임 계산기</a>
        </div>
      </div>
    </div>
  </section>

</div>

<script>
    // 배경 슬라이드 스크립트 (즉시 실행)
    (function() {
        let currentIdx = 0;
        const slides = document.querySelectorAll('.slide');

        function startSlide() {
            if(slides.length <= 1) return;
            slides[currentIdx].classList.remove('active');
            currentIdx = (currentIdx + 1) % slides.length;
            slides[currentIdx].classList.add('active');
        }

        setInterval(startSlide, 5000);
    })();
</script>
</body>
</html>
