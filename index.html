<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>에어브리지 국제특송 — 글로벌 특송 전문 (DHL·FedEx·UPS)</title>
<link rel="stylesheet" href="style.css">
<style>
/* ── 배경 슬라이드 시스템 ── */
.bg-slider {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -2; 
    background-color: #0b1120;
}
.slide {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 2s ease-in-out;
}
.slide.active { opacity: 0.3; }

/* 파일명 공백 안전 처리 */
#slide1 { background-image: url('./CargoPlane.png'); } 
#slide2 { background-image: url('./CargoShip.png'); }
#slide3 { background-image: url('./CargoTruck.png'); }

/* ── Hero 섹션 레이아웃 ── */
.hero {
  min-height: calc(100vh - var(--nav-h));
  display: flex;
  align-items: center;
  padding: 80px 0;
  background: transparent !important;
  position: relative;
}
.hero-bg, .hero-grid { opacity: 0.4; }
.hero-content { position: relative; z-index: 1; max-width: 680px; }
.hero-badge { 
    display: inline-flex; 
    align-items: center; 
    gap: 8px; 
    background: rgba(34,211,238,0.1); 
    border: 1px solid rgba(34,211,238,0.25); 
    border-radius: 20px; 
    padding: 5px 14px; 
    font-size: 12px; 
    color: var(--cyan); 
    margin-bottom: 28px; 
}
.hero-title { font-size: clamp(34px, 5vw, 64px); font-weight: 900; line-height: 1.1; margin-bottom: 24px; }
.hero-title em { font-style: normal; color: var(--cyan); display: block; }
.hero-sub { font-size: 16px; color: var(--text2); line-height: 1.8; margin-bottom: 40px; }
.hero-btns { display: flex; gap: 12px; }

/* 통계 섹션 (비밀 유지 반영) */
.hero-stats { position: absolute; right: 0; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 16px; }
.hero-stat { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 24px; text-align: right; min-width: 180px; }
.hero-stat-num { font-size: 26px; font-weight: 900; color: var(--cyan); }
.hero-stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

.section { padding: 80px 0; }
.container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
</style>
</head>
<body>

<div class="bg-slider">
    <div class="slide active" id="slide1"></div>
    <div class="slide" id="slide2"></div>
    <div class="slide" id="slide3"></div>
</div>

<div class="page-wrap">
  <section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-grid"></div>
    <div class="container">
      <div class="hero-content">
        <div class="hero-badge">글로벌 특송 파트너 — DHL · FedEx · UPS</div>
        <h1 class="hero-title">더 넓은 세상으로<br><em>가장 빠른 연결</em></h1>
        <p class="hero-sub">에어브리지 국제특송은 글로벌 톱 클래스 특송사와 함께하며<br>기업 물류부터 개인 택배까지 최적의 운송 솔루션을 제공합니다.</p>
        <div class="hero-btns">
          <a href="#" class="btn btn-primary">✈ 실시간 운임조회</a>
          <a href="#" class="btn btn-outline">📞 비즈니스 상담</a>
        </div>
      </div>
      
      <div class="hero-stats">
        <div class="hero-stat">
            <div class="hero-stat-num">220+</div>
            <div class="hero-stat-label">서비스 제공 국가</div>
        </div>
        <div class="hero-stat">
            <div class="hero-stat-num">Express</div>
            <div class="hero-stat-label">DHL · FedEx · UPS 정식 연계</div>
        </div>
      </div>
    </div>
  </section>
</div>

<script>
    let currentIdx = 0;
    const slides = document.querySelectorAll('.slide');

    function startSlide() {
        if(slides.length === 0) return;
        slides[currentIdx].classList.remove('active');
        currentIdx = (currentIdx + 1) % slides.length;
        slides[currentIdx].classList.add('active');
    }

    setInterval(startSlide, 5000);
</script>
</body>
</html>
