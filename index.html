<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>에어브리지 국제특송 — 글로벌 특송 전문 (DHL·FedEx·UPS)</title>
<meta name="description" content="에어브리지 국제특송은 글로벌 특송사(DHL, FedEx, UPS)와 함께 항공특급, 항공화물, 해상화물 서비스를 제공합니다.">
<link rel="stylesheet" href="style.css">
<style>
/* ── 배경 슬라이드 시스템 (픽스 완료) ── */
.bg-slider {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1; /* 가장 아래 레이어 */
    overflow: hidden;
    background: #0b1120; /* 이미지 로딩 전 기본 배경색 */
}

.slide {
    position: absolute;
    inset: 0;
    background-size: cover !important;
    background-position: center !important;
    background-repeat: no-repeat !important;
    opacity: 0;
    transition: opacity 2s ease-in-out;
}

/* 사진 선명도와 가독성 사이의 최적값 (0.6) */
.slide.active { 
    opacity: 0.6 !important; 
}

/* 외부 이미지 경로 (Unsplash 고화질 소스) */
#slide1 { background-image: url('https://images.unsplash.com/photo-1542296332-2e4473faf563?q=80&w=1600&auto=format&fit=crop'); } 
#slide2 { background-image: url('https://images.unsplash.com/photo-1494412574643-ff11b0a5c1c3?q=80&w=1600&auto=format&fit=crop'); }
#slide3 { background-image: url('https://images.unsplash.com/photo-1586528116311-ad8ed745eb33?q=80&w=1600&auto=format&fit=crop'); }

/* ── HERO 섹션 수정 ── */
.hero {
    min-height: calc(100vh - var(--nav-h));
    display: flex;
    align-items: center;
    position: relative;
    overflow: hidden;
    padding: 80px 0;
    /* 중요: style.css의 배경색이 뚫고 나오지 않도록 강제 설정 */
    background: transparent !important; 
}

.hero-bg {
    position: absolute;
    inset: 0;
    /* 사진 위에 어두운 그라데이션을 입혀 흰색 글자가 잘 보이게 함 */
    background: linear-gradient(to bottom, rgba(11, 17, 32, 0.85), rgba(11, 17, 32, 0.4));
    z-index: 2;
    pointer-events: none;
}

.hero-grid {
    position: absolute;
    inset: 0;
    background-image:
        linear-gradient(rgba(34, 211, 238, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(34, 211, 238, 0.1) 1px, transparent 1px);
    background-size: 50px 50px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 95%);
    z-index: 3;
    opacity: 0.2;
    pointer-events: none;
}

.hero-content {
    position: relative;
    z-index: 10; /* 글자가 모든 배경 요소보다 위에 오도록 설정 */
    max-width: 800px;
}

/* ── UI 컴포넌트 스타일 ── */
.hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(34,211,238,0.15); border: 1px solid rgba(34,211,238,0.3);
    border-radius: 20px; padding: 6px 16px; font-size: 13px;
    color: #22d3ee; font-family: var(--mono); margin-bottom: 28px;
    backdrop-filter: blur(4px);
}
.hero-badge-dot { width: 8px; height: 8px; background: #22d3ee; border-radius: 50%; box-shadow: 0 0 10px #22d3ee; }
.hero-title { font-size: clamp(36px, 6vw, 68px); font-weight: 900; letter-spacing: -2px; line-height: 1.1; margin-bottom: 24px; color: #ffffff; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
.hero-title em { font-style: normal; color: #22d3ee; display: block; }
.hero-sub { font-size: 17px; color: rgba(255, 255, 255, 0.8); line-height: 1.8; margin-bottom: 40px; }
.hero-btns { display: flex; gap: 15px; flex-wrap: wrap; }

.hero-stats { display: flex; flex-direction: row; gap: 20px; margin-top: 50px; flex-wrap: wrap; }
.hero-stat { background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 22px 28px; flex: 1; min-width: 200px; transition: all 0.3s; }
.hero-stat:hover { transform: translateY(-8px); background: rgba(255, 255, 255, 0.08); border-color: rgba(34,211,238,0.4); }
.hero-stat-num { font-size: 30px; font-weight: 900; font-family: var(--mono); color: #22d3ee; letter-spacing: -1px; }
.hero-stat-label { font-size: 14px; color: rgba(255, 255, 255, 0.6); margin-top: 8px; }

/* 공통 섹션 & 파트너 바 */
.carriers-bar { background: #0f172a; border-top: 1px solid rgba(255,255,255,0.05); padding: 30px 0; }
.carriers-inner { display: flex; justify-content: center; gap: 50px; flex-wrap: wrap; }
.carrier-item { display: flex; align-items: center; gap: 12px; }
.carrier-dot { width: 10px; height: 10px; border-radius: 50%; }

/* CTA BANNER */
.cta-banner { background: linear-gradient(135deg, #0891b2 0%, #1e40af 100%); border-radius: 24px; padding: 60px 50px; display: flex; align-items: center; justify-content: space-between; gap: 40px; margin: 60px 0; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
.cta-title { font-size: 30px; font-weight: 800; color: #fff; line-height: 1.3; }
.cta-btns { flex-shrink: 0; }
.cta-btn-w { padding: 16px 32px; background: #fff; color: #0891b2; border-radius: 12px; font-weight: 800; text-decoration: none; display: inline-block; transition: transform 0.2s; }
.cta-btn-w:hover { transform: scale(1.05); }

@media (max-width: 900px) {
    .hero { padding: 60px 0; text-align: center; }
    .hero-btns { justify-content: center; }
    .hero-stats { flex-direction: column; }
    .cta-banner { flex-direction: column; text-align: center; padding: 40px 30px; }
    .carriers-inner { gap: 20px; }
}
</style>
</head>
<body>
<div class="page-wrap">

  <section class="hero">
    <div class="bg-slider">
        <div class="slide active" id="slide1"></div>
        <div class="slide" id="slide2"></div>
        <div class="slide" id="slide3"></div>
    </div>
    
    <div class="hero-bg"></div>
    <div class="hero-grid"></div>

    <div class="container">
      <div class="hero-content">
        <div class="hero-badge">
          <span class="hero-badge-dot"></span>
          글로벌 특송 파트너 — DHL · FedEx · UPS
        </div>
        <h1 class="hero-title">
          더 넓은 세상으로<br>
          <em>가장 빠른 연결</em>
        </h1>
        <p class="hero-sub">
          에어브리지 국제특송은 글로벌 톱 클래스 특송사와 함께하며<br>
          기업 물류부터 개인 택배까지 최적의 운송 솔루션을 제공합니다.
        </p>
        <div class="hero-btns">
          <a href="/calculator.html" class="btn btn-primary btn-lg">✈ 실시간 운임조회</a>
          <a href="/contact.html" class="btn btn-outline btn-lg">📞 비즈니스 상담</a>
        </div>

        <div class="hero-stats">
          <div class="hero-stat">
            <div class="hero-stat-num">230<span style="font-size:16px;">+</span></div>
            <div class="hero-stat-label">서비스 배송 가능 국가</div>
          </div>
          <div class="hero-stat">
            <div class="hero-stat-num">Express</div>
            <div class="hero-stat-label">DHL · FedEx · UPS 정식 연계</div>
          </div>
          <div class="hero-stat">
            <div class="hero-stat-num">1<span style="font-size:16px;">일~</span></div>
            <div class="hero-stat-label">전 세계 최단 배송일 보장</div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div class="carriers-bar">
    <div class="container">
        <div class="carriers-inner">
          <div class="carrier-item">
            <div class="carrier-dot" style="background:#ef4444;"></div>
            <div class="carrier-name" style="color:#ef4444; font-weight: 700;">DHL Express</div>
          </div>
          <div class="carrier-item">
            <div class="carrier-dot" style="background:#a855f7;"></div>
            <div class="carrier-name" style="color:#a855f7; font-weight: 700;">FedEx</div>
          </div>
          <div class="carrier-item">
            <div class="carrier-dot" style="background:#f97316;"></div>
            <div class="carrier-name" style="color:#f97316; font-weight: 700;">UPS</div>
          </div>
        </div>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div class="cta-banner">
        <div>
          <div class="cta-title">지금 바로 운임을 계산해보세요</div>
          <p style="color: rgba(255,255,255,0.8); margin-top: 10px;">수출·수입 전 구간 실시간 견적 제공</p>
        </div>
        <div class="cta-btns">
          <a href="/calculator.html" class="cta-btn-w">✈ 운임 계산기</a>
        </div>
      </div>
    </div>
  </section>

</div>

<script>
    // 배경 슬라이드 스크립트 (즉시 실행)
    (function() {
        let currentIdx = 0;
        const slides = document.querySelectorAll('.slide');

        function startSlide() {
            if(slides.length <= 1) return;
            
            // 현재 슬라이드 투명화
            slides[currentIdx].classList.remove('active');
            
            // 다음 인덱스 계산
            currentIdx = (currentIdx + 1) % slides.length;
            
            // 다음 슬라이드 표시
            slides[currentIdx].classList.add('active');
        }

        // 5초마다 전환
        setInterval(startSlide, 5000);
    })();
</script>
</body>
</html>
