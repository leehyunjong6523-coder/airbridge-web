<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>에어브리지 국제특송 — 글로벌 특송 전문 (DHL·FedEx·UPS)</title>
<link rel="stylesheet" href="style.css">
<style>
/* ── Hero 섹션 레이아웃 (배경 슬라이드 통합) ── */
.hero {
  min-height: calc(100vh - var(--nav-h));
  display: flex;
  align-items: center;
  padding: 80px 0;
  position: relative;
  overflow: hidden; /* 슬라이드가 영역 밖으로 나가지 않도록 */
  background: #0b1120; /* 사진 로딩 전 기본 어두운 배경 */
}

/* ── 배경 슬라이드 시스템 (Hero 안으로 이동하여 무조건 보이게 픽스) ── */
.bg-slider {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1; /* 가장 밑바닥에 깔기 */
}
.slide {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 2s ease-in-out;
}
.slide.active { opacity: 0.35; } /* 투명도를 살짝 올려 더 잘 보이게 조정 */

/* 대표님이 방금 주신 파일명 기준 (공백 없음) 
   혹시 실제 파일명에 공백이 있다면 'Cargo Plane.png' 처럼 띄어쓰기를 꼭 맞춰주세요! */
#slide1 { background-image: url('./CargoPlane.png'); } 
#slide2 { background-image: url('./CargoShip.png'); }
#slide3 { background-image: url('./CargoTruck.png'); }

/* 기존 격자 무늬 배경 */
.hero-bg, .hero-grid { 
    position: absolute; inset: 0; z-index: 2; opacity: 0.3; pointer-events: none; 
}

/* ── 메인 콘텐츠 ── */
.hero-content { 
    position: relative; 
    z-index: 10; /* 배경보다 확실히 위로 올라오게 설정 */
    max-width: 800px; /* 통계 박스가 가로로 뻗을 수 있도록 공간 확장 */
}
.hero-badge { 
    display: inline-flex; 
    align-items: center; 
    gap: 8px; 
    background: rgba(34,211,238,0.1); 
    border: 1px solid rgba(34,211,238,0.25); 
    border-radius: 20px; 
    padding: 5px 14px; 
    font-size: 12px; 
    color: var(--cyan); 
    margin-bottom: 28px; 
}
.hero-title { font-size: clamp(34px, 5vw, 64px); font-weight: 900; line-height: 1.1; margin-bottom: 24px; color: #ffffff; }
.hero-title em { font-style: normal; color: var(--cyan); display: block; }
.hero-sub { font-size: 16px; color: rgba(255, 255, 255, 0.7); line-height: 1.8; margin-bottom: 40px; }
.hero-btns { display: flex; gap: 12px; }

/* ── 새롭게 디자인된 통계 섹션 (가로 배치 & 역동적 애니메이션) ── */
.hero-stats { 
    display: flex; 
    flex-direction: row; /* 가로 배치 */
    gap: 20px; 
    margin-top: 50px; /* 버튼 아래로 이동 */
    flex-wrap: wrap;
}
.hero-stat { 
    background: rgba(255, 255, 255, 0.05); /* 고급스러운 반투명 유리 효과 */
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1); 
    border-radius: 16px; 
    padding: 20px 24px; 
    text-align: left; 
    flex: 1; /* 박스 크기 균등 분할 */
    min-width: 200px; 
    transition: transform 0.3s ease, background 0.3s ease; /* 마우스 오버 시 부드러운 애니메이션 */
}
.hero-stat:hover {
    transform: translateY(-8px); /* 위로 살짝 떠오르는 역동적 효과 */
    background: rgba(255, 255, 255, 0.1);
}
.hero-stat-num { font-size: 28px; font-weight: 900; color: var(--cyan); }
.hero-stat-label { font-size: 13px; color: rgba(255, 255, 255, 0.6); margin-top: 6px; }

.section { padding: 80px 0; }
.container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
</style>
</head>
<body>

<div class="page-wrap">
  <section class="hero">
    <div class="bg-slider">
        <div class="slide active" id="slide1"></div>
        <div class="slide" id="slide2"></div>
        <div class="slide" id="slide3"></div>
    </div>
    <div class="hero-bg"></div>
    <div class="hero-grid"></div>
    
    <div class="container">
      <div class="hero-content">
        <div class="hero-badge">글로벌 특송 파트너 — DHL · FedEx · UPS</div>
        <h1 class="hero-title">더 넓은 세상으로<br><em>가장 빠른 연결</em></h1>
        <p class="hero-sub">에어브리지 국제특송은 글로벌 톱 클래스 특송사와 함께하며<br>기업 물류부터 개인 택배까지 최적의 운송 솔루션을 제공합니다.</p>
        <div class="hero-btns">
          <a href="#" class="btn btn-primary">✈ 실시간 운임조회</a>
          <a href="#" class="btn btn-outline">📞 비즈니스 상담</a>
        </div>
        
        <div class="hero-stats">
          <div class="hero-stat">
              <div class="hero-stat-num">230+</div>
              <div class="hero-stat-label">서비스 배송 가능 국가</div>
          </div>
          <div class="hero-stat">
              <div class="hero-stat-num">Express</div>
              <div class="hero-stat-label">DHL · FedEx · UPS 정식 연계</div>
          </div>
          <div class="hero-stat">
              <div class="hero-stat-num">1일~</div>
              <div class="hero-stat-label">전 세계 최단 배송일 보장</div>
          </div>
        </div>
      </div>
    </div>
  </section>
  
  </div>

<script>
    // 배경 슬라이드 자동 전환 스크립트
    let currentIdx = 0;
    const slides = document.querySelectorAll('.slide');

    function startSlide() {
        if(slides.length === 0) return;
        slides[currentIdx].classList.remove('active');
        currentIdx = (currentIdx + 1) % slides.length;
        slides[currentIdx].classList.add('active');
    }

    setInterval(startSlide, 5000);
</script>
</body>
</html>
